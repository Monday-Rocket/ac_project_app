name: Deploy to TestFlight

on:
  push:
    tags:
      - 'ios-v*'

env:
  FLUTTER_VERSION: "3.41.1"

jobs:
  deploy:
    name: Build & Deploy to TestFlight
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/ios-v}
          VERSION_NAME=${TAG}
          VERSION_CODE=$(( ${{ github.run_number }} + 100 ))
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios

      - name: Decode .env
        run: echo '${{ secrets.DOTENV }}' | base64 -d > .env

      - name: Decode firebase_options.dart
        run: echo '${{ secrets.FIREBASE_OPTIONS }}' | base64 -d > ./lib/firebase_options.dart

      - name: Decode firebase_app_id_file.json
        run: echo '${{ secrets.FIREBASE_APP_ID_FILE }}' | base64 -d > ./ios/firebase_app_id_file.json

      - name: Decode GoogleService-Info.plist
        run: echo '${{ secrets.GOOGLE_SERVICE_IOS }}' | base64 -d > ./ios/Runner/GoogleService-Info.plist

      - name: Decode Secrets.xcconfig
        run: echo '${{ secrets.SECRETS_XCCONFIG }}' | base64 -d > ./ios/Secrets.xcconfig

      - name: Decode App Store Connect API Key
        run: echo "${{ secrets.APP_STORE_API_KEY_BASE64 }}" | base64 --decode > ios/fastlane/AuthKey.p8

      - name: Clean and install dependencies
        run: flutter clean && flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Sync build number across targets
        working-directory: ios
        run: |
          VERSION_NAME="${{ steps.version.outputs.VERSION_NAME }}"
          VERSION_CODE="${{ steps.version.outputs.VERSION_CODE }}"
          # Extension/Runner target 모두의 하드코딩된 버전값 치환
          sed -i '' -E "s/CURRENT_PROJECT_VERSION = [^;]+;/CURRENT_PROJECT_VERSION = ${VERSION_CODE};/g" Runner.xcodeproj/project.pbxproj
          sed -i '' -E "s/MARKETING_VERSION = [^;]+;/MARKETING_VERSION = ${VERSION_NAME};/g" Runner.xcodeproj/project.pbxproj
          echo "✅ pbxproj 버전 동기화: $VERSION_NAME ($VERSION_CODE)"
          grep -E "CURRENT_PROJECT_VERSION|MARKETING_VERSION" Runner.xcodeproj/project.pbxproj | sort -u

      - name: Build Flutter iOS
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --build-name=${{ steps.version.outputs.VERSION_NAME }} \
            --build-number=${{ steps.version.outputs.VERSION_CODE }}

      - name: Deploy to TestFlight
        run: |
          cd ios
          bundle exec fastlane deploy_testflight
        env:
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_KEY_PATH: fastlane/AuthKey.p8
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.GIT_AUTHORIZATION }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: |
            ~/Library/Logs/gym/Runner-Runner.log
            ios/build/
          retention-days: 7

      - name: Summary
        run: echo "✅ Deployed v${{ steps.version.outputs.VERSION_NAME }}+${{ steps.version.outputs.VERSION_CODE }} to TestFlight"
